server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router / SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: cache static assets
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}